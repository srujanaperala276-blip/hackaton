services:
  # Python Backend API (FastAPI)
  - type: web
    name: plagiarism-backend
    env: python
    region: ohio
    buildCommand: "pip install -r deployment/requirements.txt"
    startCommand: "gunicorn -w 2 -k uvicorn.workers.UvicornWorker backend.app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CORS_ORIGIN
        value: "*" # Update in production
        
  # Static React Frontend Site
  - type: web
    name: plagiarism-frontend
    env: static
    region: ohio
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
